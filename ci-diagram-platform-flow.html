<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Continuum Intelligence v3 - Platform Flow</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f8f7f4;
            --bg-secondary: #ffffff;
            --text-primary: #1a2332;
            --text-secondary: #2d3436;
            --border-subtle: 1px solid #e0ddd7;
            --accent-blue: #2563eb;
            --accent-teal: #0d9488;
            --accent-amber: #b45309;
            --accent-red: #a83232;
            --stage-1: #6d28d9;
            --stage-2: #2563eb;
            --stage-3: #0d9488;
            --stage-4: #b45309;
            --stage-5: #be185d;
            --stage-6: #0891b2;
            --stage-7: #10b981;
        }

        html {
            scrollbar-color: rgba(0, 0, 0, 0.1) transparent;
            scrollbar-width: thin;
        }

        ::-webkit-scrollbar {
            height: 8px;
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.2);
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            padding: 2rem;
            line-height: 1.6;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: var(--border-subtle);
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-teal));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .controls {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.5rem 1rem;
            border: var(--border-subtle);
            border-radius: 6px;
            background-color: transparent;
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 200ms ease;
        }

        .btn:hover {
            background-color: rgba(0, 0, 0, 0.05);
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }

        .btn.active {
            background-color: var(--accent-blue);
            border-color: var(--accent-blue);
            color: #f8f7f4;
        }

        .diagram-wrapper {
            overflow-x: auto;
            overflow-y: visible;
            background-color: var(--bg-secondary);
            border: var(--border-subtle);
            border-radius: 8px;
            padding: 2rem;
            position: relative;
        }

        .diagram-scroll-hint {
            position: absolute;
            bottom: 1rem;
            right: 1rem;
            font-size: 12px;
            color: var(--text-secondary);
            opacity: 0.6;
        }

        svg {
            min-width: 100%;
            height: auto;
            display: block;
        }

        .stage-node {
            cursor: pointer;
            transition: all 200ms ease;
        }

        .stage-node rect {
            transition: fill 200ms ease;
        }

        .stage-node:hover rect {
            filter: brightness(1.2);
        }

        .stage-node text {
            user-select: none;
            pointer-events: none;
        }

        .detail-panel {
            margin-top: 2rem;
            padding: 1.5rem;
            background-color: var(--bg-secondary);
            border: var(--border-subtle);
            border-radius: 8px;
            min-height: 150px;
            animation: slideDown 200ms ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .detail-panel h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .detail-stage-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        .detail-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .detail-item {
            padding: 1rem;
            background-color: rgba(0, 0, 0, 0.02);
            border: var(--border-subtle);
            border-radius: 6px;
            transition: all 200ms ease;
        }

        .detail-item:hover {
            background-color: rgba(0, 0, 0, 0.04);
            border-color: rgba(0, 0, 0, 0.12);
        }

        .detail-item h4 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .detail-item p {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .detail-item .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background-color: rgba(0, 0, 0, 0.08);
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            margin-top: 0.75rem;
            margin-right: 0.5rem;
            color: var(--text-secondary);
        }

        .legend {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background-color: var(--bg-primary);
            border: var(--border-subtle);
            border-radius: 6px;
            padding: 1rem;
            font-size: 12px;
            z-index: 10;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .legend-item:last-child {
            margin-bottom: 0;
        }

        .legend-swatch {
            width: 16px;
            height: 16px;
            border-radius: 3px;
        }

        .tooltip {
            position: absolute;
            background-color: var(--bg-primary);
            border: var(--border-subtle);
            border-radius: 6px;
            padding: 0.75rem;
            font-size: 12px;
            color: var(--text-secondary);
            max-width: 200px;
            pointer-events: none;
            z-index: 100;
            opacity: 0;
            transition: opacity 200ms ease;
        }

        .tooltip.visible {
            opacity: 1;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .empty-state p {
            font-size: 14px;
        }

        @media (max-width: 1024px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }

            .controls {
                width: 100%;
            }

            .btn {
                flex: 1;
                text-align: center;
            }

            .legend {
                position: static;
                margin-bottom: 1rem;
            }

            .diagram-wrapper {
                overflow-x: scroll;
            }
        }

        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }

            .header h1 {
                font-size: 20px;
            }

            .controls {
                flex-wrap: wrap;
            }

            .detail-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

        // Initialize state
        let expandedStages = new Set();
        const svg = document.getElementById('platformDiagram');
        const detailPanel = document.getElementById('detailPanel');
        const emptyState = document.getElementById('emptyState');
        const tooltip = document.getElementById('tooltip');
        const expandAllBtn = document.getElementById('expandAllBtn');
        const collapseAllBtn = document.getElementById('collapseAllBtn');

        // Stage node click handler
        const stageNodes = svg.querySelectorAll('.stage-node');
        stageNodes.forEach(node => {
            node.addEventListener('click', function() {
                const stage = this.getAttribute('data-stage');
                toggleStage(stage);
            });
            node.addEventListener('mouseover', function(e) {
                const stage = this.getAttribute('data-stage');
                showTooltip(e, stage);
            });
            node.addEventListener('mouseout', hideTooltip);
        });

        // Tooltip text by stage
        const tooltips = {
            1: 'Click to expand: Data sources feeding the platform',
            2: 'Click to expand: Automated GitHub Actions workflows',
            3: 'Click to expand: ACH research engine -- hypotheses, evidence domains, prompts',
            4: 'Click to expand: Multi-model LLM orchestration',
            5: 'Click to expand: Memory and personalization layer',
            6: 'Click to expand: User interface on Cloudflare Pages',
            7: 'Click to expand: End-user recommendations and reports'
        };

        function showTooltip(event, stage) {
            tooltip.textContent = tooltips[stage];
            tooltip.classList.add('visible');
            const rect = event.target.getBoundingClientRect();
            tooltip.style.left = (rect.left + rect.width / 2 - 100) + 'px';
            tooltip.style.top = (rect.top + rect.height + 10) + 'px';
        }

        function hideTooltip() {
            tooltip.classList.remove('visible');
        }

        function toggleStage(stage) {
            if (expandedStages.has(stage)) {
                expandedStages.delete(stage);
            } else {
                expandedStages.add(stage);
            }
            renderDetailPanel();
        }

        function expandAll() {
            expandedStages = new Set(['1', '2', '3', '4', '5', '6', '7']);
            renderDetailPanel();
            expandAllBtn.classList.add('active');
            collapseAllBtn.classList.remove('active');
        }

        function collapseAll() {
            expandedStages.clear();
            detailPanel.style.display = 'none';
            emptyState.style.display = 'block';
            expandAllBtn.classList.remove('active');
            collapseAllBtn.classList.add('active');
        }

        function renderDetailPanel() {
            if (expandedStages.size === 0) {
                detailPanel.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            detailPanel.style.display = 'block';

            let html = '';
            const stages = Array.from(expandedStages).sort();

            stages.forEach(stage => {
                const stageData = stageDetails[stage];
                const stageColors = {
                    1: '#6d28d9',
                    2: '#2563eb',
                    3: '#0d9488',
                    4: '#b45309',
                    5: '#be185d',
                    6: '#0891b2',
                    7: '#10b981'
                };

                html += `
                    <h3>
                        <div class="detail-stage-indicator" style="background-color: ${stageColors[stage]};"></div>
                        ${stageData.title}
                    </h3>
                    <p style="color: var(--text-secondary); margin-bottom: 1rem; font-size: 13px;">${stageData.description}</p>
                    <div class="detail-content">
                `;

                stageData.items.forEach(item => {
                    html += `
                        <div class="detail-item">
                            <h4>${item.title}</h4>
                            <p>${item.description}</p>
                            <span class="badge">${item.badge}</span>
                        </div>
                    `;
                });

                html += `</div>`;
                if (stage !== stages[stages.length - 1]) {
                    html += `<div style="border-top: var(--border-subtle); margin: 2rem 0;"></div>`;
                }
            });

            detailPanel.innerHTML = html;
        }

        // Event listeners
        expandAllBtn.addEventListener('click', expandAll);
        collapseAllBtn.addEventListener('click', collapseAll);

        // Initial state
        renderDetailPanel();
    </script>
