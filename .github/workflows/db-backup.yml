name: Database Backup
on:
  schedule:
    - cron: '0 18 * * *'  # 18:00 UTC = 04:00 AEDT
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL 17 client
        run: |
          sudo apt-get install -y curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.pgdg.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.pgdg.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Run pg_dump
        run: |
          export PATH="/usr/lib/postgresql/17/bin:$PATH"
          pg_dump --version
          DBURL="${{ secrets.FLYIO_DATABASE_URL }}"
          if [[ "$DBURL" == *"?"* ]]; then
            DBURL="${DBURL}&sslnegotiation=postgres"
          else
            DBURL="${DBURL}?sslnegotiation=postgres"
          fi
          pg_dump --no-owner --no-tablespaces -Fc "$DBURL" \
            > ci_backup_$(date +%Y%m%d).dump
          ls -lh ci_backup_*.dump

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: ci_backup_*.dump
          retention-days: 90
