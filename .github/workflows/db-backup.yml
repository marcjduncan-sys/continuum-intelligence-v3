name: Database Backup
on:
  schedule:
    - cron: '0 18 * * *'  # 18:00 UTC = 04:00 AEDT
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-22.04
    steps:
      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Run pg_dump
        run: |
          pg_dump --version
          # Strip any sslmode from URL, force sslmode=disable
          DBURL="${{ secrets.FLYIO_DATABASE_URL }}"
          DBURL=$(echo "$DBURL" | sed 's/[?&]sslmode=[^&]*//g')
          if [[ "$DBURL" == *"?"* ]]; then
            DBURL="${DBURL}&sslmode=disable"
          else
            DBURL="${DBURL}?sslmode=disable"
          fi
          pg_dump --no-owner --no-tablespaces -Fc "$DBURL" \
            > ci_backup_$(date +%Y%m%d).dump
          ls -lh ci_backup_*.dump

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: ci_backup_*.dump
          retention-days: 90
