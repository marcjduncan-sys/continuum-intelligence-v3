name: Daily Research Update

on:
  schedule:
    # 08:00 UTC Mon-Fri = 18:00 AEST / 19:00 AEDT (after ASX close + settlement)
    # Runs ~90 min after the last continuum-update.yml cron (06:00 UTC)
    - cron: '0 8 * * 1-5'
  workflow_dispatch:
    inputs:
      ticker:
        description: 'Specific ticker to update (or leave empty for all)'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-research:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest prices
        run: node scripts/fetch-live-prices.js

      - name: Update stock JSONs with prices
        run: node scripts/update-stock-json.js

      - name: Run research update
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.ticker }}" ]; then
            ARGS="--ticker ${{ github.event.inputs.ticker }}"
          fi
          node scripts/update-research.js $ARGS

      - name: Validate research JSON
        run: |
          python3 -c "
          import json, sys, glob
          files = glob.glob('data/research/*.json')
          files = [f for f in files if '_index.json' not in f]
          errors = 0
          for f in files:
              with open(f) as fh:
                  try:
                      data = json.load(fh)
                  except json.JSONDecodeError:
                      print(f'INVALID JSON: {f}')
                      errors += 1
                      continue
                  required = ['hypotheses', 'evidence', 'narrative', 'skew']
                  missing = [k for k in required if k not in data]
                  if missing:
                      print(f'MISSING KEYS in {f}: {missing}')
                      errors += 1
          if errors:
              print(f'{errors} file(s) failed validation. Aborting commit.')
              sys.exit(1)
          print(f'All {len(files)} research files validated.')
          "

      - name: Check for changes
        id: changes
        run: |
          git add data/stocks/ data/live-prices.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Research update — scores + freshness — $(date -u +'%d %b %Y')"
          git pull --rebase origin main
          git push
