name: Backfill Price History

on:
  workflow_dispatch:
    inputs:
      tickers:
        description: 'Space-separated tickers (blank = all short histories)'
        required: false
        default: ''
      force:
        description: 'Re-backfill even if >= 252 points'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Backfill price history
        run: |
          ARGS="${{ github.event.inputs.tickers }}"
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          node scripts/backfill-price-history.js $ARGS

      - name: Sync index
        run: node scripts/sync-index.js

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/ 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "Backfill price history — $(date -u +'%d %b %Y')"
          git pull --rebase origin main
          git push
